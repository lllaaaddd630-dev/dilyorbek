<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilyorbek - Tug'ilgan kuni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --white: #FFFFFF;
            --gold: #cfa84a;
            --gold-light: #ffd27a;
            --gold-dark: #b8943a;
            --autumn-brown: #8B4513;
            --autumn-orange: #D2691E;
            --autumn-red: #A52A2A;
            --shadow: rgba(207, 168, 74, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fef9e7 0%, #fff9e6 100%);
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background video {
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            opacity: 0.15;
            filter: sepia(0.4) brightness(1.05);
        }

        .fallback-leaves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .leaf {
            position: absolute;
            width: 25px;
            height: 25px;
            background: linear-gradient(135deg, var(--gold), var(--autumn-orange));
            border-radius: 50% 0 50% 0;
            opacity: 0.7;
            z-index: -1;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.1));
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        .birthday-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(207, 168, 74, 0.25);
            border: 2px solid rgba(207, 168, 74, 0.1);
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .birthday-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(to right, var(--gold), var(--autumn-orange), var(--gold));
        }

        .cake-icon {
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            animation: bounce 2s infinite;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .birthday-date {
            font-size: 1.4rem;
            color: var(--autumn-brown);
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .countdown-section {
            margin: 3rem 0;
        }

        .countdown-title {
            font-size: 1.3rem;
            color: var(--autumn-brown);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            border-radius: 15px;
            padding: 1.5rem 1rem;
            min-width: 100px;
            box-shadow: 0 10px 25px rgba(207, 168, 74, 0.3);
            color: white;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        .countdown-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .countdown-label {
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.9;
        }

        .days-left {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(207, 168, 74, 0.1);
            border-radius: 15px;
            border: 2px dashed var(--gold);
        }

        .next-birthday {
            font-size: 1.2rem;
            color: var(--autumn-brown);
            margin-bottom: 2rem;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(207, 168, 74, 0.4);
            font-size: 1.1rem;
            text-decoration: none;
            margin-top: 1rem;
        }

        .home-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(207, 168, 74, 0.5);
        }

        .home-btn i {
            margin-right: 0.7rem;
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background: var(--gold);
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-20px);
            }
            60% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(207, 168, 74, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 30px rgba(207, 168, 74, 0.4);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(207, 168, 74, 0.3);
            }
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg) translateX(0px);
                opacity: 0.8;
            }
            25% {
                transform: translateY(25vh) rotate(90deg) translateX(var(--sway));
            }
            50% {
                transform: translateY(50vh) rotate(180deg) translateX(calc(var(--sway) * -1));
            }
            75% {
                transform: translateY(75vh) rotate(270deg) translateX(var(--sway));
            }
            100% {
                transform: translateY(100vh) rotate(360deg) translateX(calc(var(--sway) * -1));
                opacity: 0;
            }
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsive styles */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .birthday-card {
                padding: 2rem 1.5rem;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .countdown {
                gap: 1rem;
            }
            
            .countdown-item {
                min-width: 80px;
                padding: 1rem 0.5rem;
            }
            
            .countdown-number {
                font-size: 2rem;
            }
            
            .days-left {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Video -->
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-autumn-leaves-falling-from-trees-1082-large.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Fallback Leaves Animation -->
    <div class="fallback-leaves" id="leaves-container"></div>

    <!-- Confetti Container -->
    <div id="confetti-container"></div>

    <div class="container">
        <div class="birthday-card">
            <div class="cake-icon">
                <i class="fas fa-birthday-cake"></i>
            </div>
            
            <h1>Dilyorbek</h1>
            <p class="birthday-date">Tug'ilgan kuni: 8-dekabr</p>
            
            <div class="countdown-section">
                <h2 class="countdown-title">Keyingi tug'ilgan kungacha qolgan vaqt:</h2>
                
                <div class="countdown">
                    <div class="countdown-item">
                        <div class="countdown-number" id="days">0</div>
                        <div class="countdown-label">Kun</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="hours">0</div>
                        <div class="countdown-label">Soat</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="minutes">0</div>
                        <div class="countdown-label">Daqiqa</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="seconds">0</div>
                        <div class="countdown-label">Soniya</div>
                    </div>
                </div>
                
                <div class="days-left" id="total-days">
                    Jami kunlar: hisoblanmoqda...
                </div>
                
                <p class="next-birthday" id="next-birthday">
                    Keyingi tug'ilgan kun: hisoblanmoqda...
                </p>
            </div>
            
            <a href="index.html" class="home-btn">
                <i class="fas fa-home"></i> Asosiy sahifaga qaytish
            </a>
        </div>
    </div>

    <script>
        // Optimized leaf animation
        function initLeaves() {
            const leavesContainer = document.getElementById('leaves-container');
            const leafCount = 20;
            
            // Create all leaves initially
            for (let i = 0; i < leafCount; i++) {
                createLeaf();
            }
            
            function createLeaf() {
                const leaf = document.createElement('div');
                leaf.classList.add('leaf');
                
                // Random position
                const leftPos = Math.random() * 100;
                leaf.style.left = `${leftPos}vw`;
                
                // Random size
                const size = 15 + Math.random() * 20;
                leaf.style.width = `${size}px`;
                leaf.style.height = `${size}px`;
                
                // Random color variation
                const hue = 30 + Math.random() * 40;
                const saturation = 60 + Math.random() * 30;
                const lightness = 35 + Math.random() * 25;
                leaf.style.background = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                
                // Random animation
                const duration = 8 + Math.random() * 12;
                const delay = Math.random() * 5;
                const sway = 15 + Math.random() * 45;
                leaf.style.setProperty('--sway', `${sway}px`);
                leaf.style.animation = `fall ${duration}s linear ${delay}s infinite`;
                
                leavesContainer.appendChild(leaf);
                
                // Reuse leaf instead of recreating
                leaf.addEventListener('animationiteration', function() {
                    // Reset position for next iteration
                    leaf.style.left = `${Math.random() * 100}vw`;
                });
            }
        }

        // Improved countdown with better precision
        function updateCountdown() {
            const now = new Date();
            const currentYear = now.getFullYear();
            
            // Set birthday to December 8th
            let nextBirthday = new Date(currentYear, 11, 8); // December is month 11
            
            // If birthday has already passed this year, set to next year
            if (now > nextBirthday) {
                nextBirthday = new Date(currentYear + 1, 11, 8);
            }
            
            const timeDiff = nextBirthday - now;
            
            // Calculate days, hours, minutes, seconds
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);
            
            // Update display
            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            
            // Update total days
            document.getElementById('total-days').textContent = `Keyingi tug'ilgan kunigacha: ${days} kun`;
            
            // Update next birthday date
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('next-birthday').textContent = 
                `Keyingi tug'ilgan kun: ${nextBirthday.toLocaleDateString('uz-UZ', options)}`;
            
            // Create confetti when it's close to birthday
            if (days === 0 && hours < 24) {
                createConfetti();
            }
        }
        
        // Create confetti effect
        function createConfetti() {
            const confettiContainer = document.getElementById('confetti-container');
            const confettiCount = 30;
            
            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Random position
                confetti.style.left = Math.random() * 100 + 'vw';
                
                // Random size
                const size = 5 + Math.random() * 10;
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                
                // Random color
                const colors = ['#cfa84a', '#ffd27a', '#D2691E', '#A52A2A', '#8B4513'];
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Random shape
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                
                // Random animation
                const duration = 1 + Math.random() * 2;
                const delay = Math.random() * 2;
                confetti.style.animation = `confettiFall ${duration}s linear ${delay}s forwards`;
                
                confettiContainer.appendChild(confetti);
                
                // Remove confetti after animation
                setTimeout(() => {
                    if (confetti.parentNode) {
                        confetti.remove();
                    }
                }, (duration + delay) * 1000);
            }
        }

        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', function() {
            initLeaves();
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            // Create confetti periodically for effect
            setInterval(createConfetti, 10000);
        });
    </script>
</body>
</html>
